app = "emoney-frontend"
primary_region = "gru"

[build]
  [build.args]
    VITE_API_URL = "https://emoney-backend.fly.dev/api"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
